name: Theme CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-parent:
    name: Build & Validate (lacadev-client)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/public/wp-content/themes/lacadev-client

    strategy:
      matrix:
        php-version: ['8.1']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('app/public/wp-content/themes/lacadev-client/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer Dependencies
        run: composer install --prefer-dist --no-progress

      - name: Validate composer.json
        run: composer validate --no-check-publish

  build-child:
    name: Build & Lint (lacadev-client-child)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/public/wp-content/themes/lacadev-client-child

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Create config.json from dist
        run: cp config.json.dist config.json

      - name: Install Node Dependencies
        run: yarn install --frozen-lockfile

      - name: Run Build
        run: yarn build

      - name: Run Lint
        run: yarn lint
